name: CI Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          
      - name: Build Docker image (Check for errors)
        run: |
          docker build \
          --build-arg DATABASE_URL="postgresql://placeholder@localhost:5432/db" \
          -t my-app-test .